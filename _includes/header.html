<header class="site-header">

  <div class="container header-inner">

    <a
      href="{{ '/' | relative_url }}"
      class="site-logo"
      aria-label="Patchara Thai Massage home"
    >
      <img
        src="{{ '/assets/images/logo.png' | relative_url }}"
        alt="Patchara Thai Massage"
        class="site-logo-image"
      >
    </a>

    <button
      class="mobile-nav-toggle"
      type="button"
      aria-label="Open navigation"
      aria-expanded="false"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="header-right">

      <nav class="site-nav" aria-label="Main navigation">
        <a href="#treatments">Treatments</a>
        <a href="#prices">Prices</a>
        <a href="#about">About</a>
        <a href="#reviews">Reviews</a>
        <a href="#contact">Contact</a>
      </nav>

      <a href="tel:01612720430" class="header-button">
        Book now
      </a>

    </div>

  </div>

</header>

<script>
  const navToggle = document.querySelector(".mobile-nav-toggle");
  const headerRight = document.querySelector(".header-right");

  if (navToggle && headerRight) {
    navToggle.addEventListener("click", () => {
      const isOpen = headerRight.classList.toggle("is-open");
      navToggle.classList.toggle("is-open");
      navToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
    });

    document.querySelectorAll(".site-nav a").forEach((link) => {
      link.addEventListener("click", () => {
        headerRight.classList.remove("is-open");
        navToggle.classList.remove("is-open");
        navToggle.setAttribute("aria-expanded", "false");
      });
    });
  }
</script>
