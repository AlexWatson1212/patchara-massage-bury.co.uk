<!-- _includes/header.html -->

<header class="site-header">
  <div class="container header-inner">

    <a href="{{ '/' | relative_url }}" class="site-logo" aria-label="Patchara Thai Massage home">
      <img
        src="{{ '/assets/images/logo.png' | relative_url }}"
        alt="Patchara Thai Massage"
        class="site-logo-image"
      >
    </a>

    <button class="mobile-nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="mobile-nav-overlay" aria-hidden="true"></div>

    <div class="header-right" aria-hidden="true">
      <div class="mobile-menu-head">
        <img
          src="{{ '/assets/images/logo.png' | relative_url }}"
          alt="Patchara Thai Massage"
          class="mobile-menu-logo"
        >

        <button class="mobile-menu-close" type="button" aria-label="Close navigation">
          ×
        </button>
      </div>

      <nav class="site-nav" aria-label="Main navigation">
        <a href="#about">Welcome</a>
        <a href="#treatments">Treatments</a>
        <a href="#prices">Prices</a>
        <a href="#reviews">Reviews</a>
        <a href="#contact">Contact</a>
      </nav>

      <a href="tel:01612720430" class="header-button">
        Book now
      </a>

      <a href="tel:01612720430" class="mobile-menu-phone">
        0161 272 0430
      </a>
    </div>

  </div>
</header>

<script>
  const navToggle = document.querySelector(".mobile-nav-toggle");
  const headerRight = document.querySelector(".header-right");
  const navOverlay = document.querySelector(".mobile-nav-overlay");
  const navClose = document.querySelector(".mobile-menu-close");

  if (navToggle && headerRight && navOverlay) {
    function closeMenu() {
      headerRight.classList.remove("is-open");
      navToggle.classList.remove("is-open");
      navOverlay.classList.remove("is-visible");
      document.body.classList.remove("nav-open");
      navToggle.setAttribute("aria-expanded", "false");
      navToggle.setAttribute("aria-label", "Open navigation");
      headerRight.setAttribute("aria-hidden", "true");
    }

    function openMenu() {
      headerRight.classList.add("is-open");
      navToggle.classList.add("is-open");
      navOverlay.classList.add("is-visible");
      document.body.classList.add("nav-open");
      navToggle.setAttribute("aria-expanded", "true");
      navToggle.setAttribute("aria-label", "Close navigation");
      headerRight.setAttribute("aria-hidden", "false");
    }

    navToggle.addEventListener("click", () => {
      headerRight.classList.contains("is-open") ? closeMenu() : openMenu();
    });

    navOverlay.addEventListener("click", closeMenu);

    if (navClose) {
      navClose.addEventListener("click", closeMenu);
    }

    document.querySelectorAll(".site-nav a, .header-button").forEach((link) => {
      link.addEventListener("click", closeMenu);
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeMenu();
    });

    window.addEventListener("resize", () => {
      if (window.innerWidth > 760) closeMenu();
    });
  }
</script>
